<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Diary</title>
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="header__wrapper">
                <picture>
                    <img src="images/header-logo.png" srcset="images/header-logo@2x.png 2x" width="151" height="56"
                        alt="логотип компании">
                </picture>
                <nav class="header-nav">
                    <ul class="nav-list">
                        <li class="nav-list__item">
                            <a href="#video" class="nav-list__link">Видео</a>
                        </li>
                        <li class="nav-list__item">
                            <a href="#programms" class="nav-list__link">Список программ</a>
                        </li>
                        <li class="nav-list__item">
                            <a href="#shedule" class="nav-list__link">План</a>
                        </li>
                        <li class="nav-list__item">
                            <a href="main.html" class="nav-list__link">Главная</a>
                        </li>
                    </ul>
                </nav>
                <a href="#" class="header-login__link">
                    Вход
                    <svg class="header__login-icon" width="24" height="24" aria-hidden="true">
                        <use xlink:href="images/sprite.svg#icon-login"></use>
                    </svg>
                </a>
            </div>
        </div>
    </header>
    <main>
        <section class="account-main">
            <div class="container">
                <div class="account-main__wrapper">
                    <div class="account-main__acc">
                        <picture>
                            <img class="account-main__img" src="images/image-polina.png"
                                srcset="images/image-polina@2x.png 2x" width="58" height="58" alt="картинка девушки">
                        </picture>
                        <span class="account-main__name">Полина</span>
                    </div>
                    <a href="account.html" class="btn btn--food">Назад</a>
                </div>
            </div>
        </section>
        <section class="food-diary">
            <div class="container">
                <div class="food-diary__week">
                    <span class="food-diary__day">Сегодня</span>
                    <span class="food-diary__month">27/04</span>
                </div>
                <svg class="header__login-icon" width="215" height="215" aria-hidden="true">
                    <use xlink:href="images/sprite.svg#icon-circle"></use>
                </svg>
            </div>
        </section>
    </main>
</body>

</html>
