<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="header__wrapper">
                <picture>
                    <img src="images/header-logo.png" srcset="images/header-logo@2x.png 2x" width="151" height="56"
                        alt="логотип компании">
                </picture>
                <nav class="header-nav">
                    <ul class="nav-list">
                        <li class="nav-list__item">
                            <a href="#" class="nav-list__link">Видео</a>
                        </li>
                        <li class="nav-list__item">
                            <a href="#" class="nav-list__link">Список программ</a>
                        </li>
                        <li class="nav-list__item">
                            <a href="#" class="nav-list__link">План</a>
                        </li>
                    </ul>
                </nav>
                <a href="#" class="header-login__link">
                    Вход
                    <svg class="header__login-icon" width="24" height="24" aria-hidden="true">
                        <use xlink:href="images/sprite.svg#icon-login"></use>
                    </svg>
                </a>
            </div>
        </div>
    </header>
    <main>
        <section class="banner">
            <div class="container">
                <h2 class="banner__title">Kinēma</h2>
                <picture>
                    <img class="banner__img" src="images/image-banner.png" srcset="images/image-banner@2x.png 2x" width="1037" height="554"
                        alt="баннер компании">
                </picture>
            </div>
        </section>
    </main>
</body>

</html>
