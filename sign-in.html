<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Document</title>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header__wrapper">
                <picture>
                    <img src="images/header-logo.png" srcset="images/header-logo@2x.png 2x" width="151" height="56"
                        alt="логотип компании">
                </picture>
                <nav class="header-nav">
                    <ul class="nav-list">
                        <li class="nav-list__item">
                            <a href="#video" class="nav-list__link">Видео</a>
                        </li>
                        <li class="nav-list__item">
                            <a href="#programms" class="nav-list__link">Список программ</a>
                        </li>
                        <li class="nav-list__item">
                            <a href="#shedule" class="nav-list__link">План</a>
                        </li>
                    </ul>
                </nav>
                <a href="#" class="header-login__link">
                    Вход
                    <svg class="header__login-icon" width="24" height="24" aria-hidden="true">
                        <use xlink:href="images/sprite.svg#icon-login"></use>
                    </svg>
                </a>
            </div>
        </div>
    </header>
    <section class="sign-in">
            <div class="container">
                <div class="sign-in_wrapper">
                    <h2 class="sign-in__title">Вход</h2>
                    <form action="" class="sign-in__form">
                        <label for="sign-in-phone__input" class="sign-in-phone__text"> Телефон</label>
                        <br>
                        <input class="sign-in-phone__input" type="text" placeholder="+7 (XXX) XXX XX XX">
                        <br>
                        <label for="sign-in-password__input" class="sign-in-password__text">Пароль</label>
                        <br>
                        <input class="sign-in-password__input" type="password" placeholder="Введите пароль">
                    </form>
                    <div class="sign-in-noacc__div">
                        <span class="sign-in-noacc_text">Ещё нет аккаунта?</span>
                        <a href="#" class="sign-in-noacc_link" >Зарегистрироваться</a>
                    </div>
                    <br>
                    <div class="sign-in-div__btn">
                        <button class="sign-in__btn">Войти в аккаунт</button>
                    </div>
                </div>
            </div>
    </section>
</body>
</html>
