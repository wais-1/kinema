<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Document</title>
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="header__wrapper">
                <picture>
                    <img class="header__logo-big" src="images/header-logo.png" srcset="images/header-logo@2x.png 2x"
                        width="151" height="56" alt="логотип компании">
                    <img class="header__logo-mini" src="images/header-logo-mini.png"
                        srcset="images/header-logo-mini@2x.png 2x" width="24" height="56" alt="логотип компании">
                </picture>
                <nav class="header-nav">
                    <ul class="nav-list">
                        <li class="nav-list__item">
                            <a href="#video" class="nav-list__link">Видео</a>
                        </li>
                        <li class="nav-list__item">
                            <a href="#programms" class="nav-list__link">Список программ</a>
                        </li>
                        <li class="nav-list__item">
                            <a href="#shedule" class="nav-list__link">План</a>
                        </li>
                        <li class="nav-list__item">
                            <a href="index.html" class="nav-list__link">Главная</a>
                        </li>
                    </ul>
                </nav>
                <a href="#" class="header-login__link">
                    Вход
                    <svg class="header__login-icon" width="24" height="24" aria-hidden="true">
                        <use xlink:href="images/sprite.svg#icon-login"></use>
                    </svg>
                </a>
            </div>
        </div>
    </header>
    <section class="sign-in">
        <div class="container">
            <div class="sign-in__wrapper">
                <h3 class="sign-in__title">Регистрация</h3>
                <form action="#" method="post" class="sign-in__form">
                    <div class="custom-input">
                        <input type="text" class="custom-input__field" id="text-phone" placeholder="Придумайте пароль">
                        <label for="text-phone" class="custom-input__label">Пароль</label>
                    </div>
                    <div class="custom-input">
                        <input type="password" class="custom-input__field" placeholder="Введите пароль еще раз" id="text-code">
                        <label for="text-code" class="custom-input__label">Повторите пароль</label>
                    </div>
                </form>
                <a href="account.html" class="sign-in__link">Зарегестрироваться</a>
            </div>
        </div>
    </section>
</body>

</html>
